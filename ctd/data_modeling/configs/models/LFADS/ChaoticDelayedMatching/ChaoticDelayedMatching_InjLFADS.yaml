_target_: ctd.data_modeling.models.LFADS.lfads.LFADS

gen_type: NODE
inv_encoder: False
encod_data_dim: 64
encod_seq_len: 1050
recon_data_dim: 96
recon_seq_len: 1050
ext_input_dim: 2
ic_enc_seq_len: 0
ic_enc_dim: 256
ci_enc_dim: 0
ci_lag: 1
con_dim: 0
co_dim: 0
ic_dim: 4
gen_dim: 4
fac_dim: 4

readin:
  - _target_: torch.nn.Identity
readout:
  - _target_: ctd.data_modeling.models.LFADS.modules.readin_readout.StiefelLinear
    in_features: ${fac_dim}
    out_features: ${recon_data_dim}

train_aug_stack:
  _target_: ctd.data_modeling.models.LFADS.modules.augmentations.AugmentationStack
  transforms:
    - _target_: ctd.data_modeling.models.LFADS.modules.augmentations.CoordinatedDropout
      cd_rate: 0.3
      cd_pass_rate: 0.0
      ic_enc_seq_len: ${ic_enc_seq_len}
  batch_order: [0]
  loss_order: [0]
infer_aug_stack:
  _target_: ctd.data_modeling.models.LFADS.modules.augmentations.AugmentationStack
  transforms:
    - _target_: ctd.data_modeling.models.LFADS.modules.augmentations.IgnoreNaNLoss
      encod_data_dim: ${encod_data_dim}
      encod_seq_len: ${encod_seq_len}
      scale_by_quadrant: False
  loss_order: [0]

reconstruction:
  - _target_: ctd.data_modeling.models.LFADS.modules.recons.Poisson
variational: True

co_prior:
  _target_: ctd.data_modeling.models.LFADS.modules.priors.AutoregressiveMultivariateNormal
  tau: 10.0
  nvar: 0.1
  shape: ${co_dim}

ic_prior:
  _target_: ctd.data_modeling.models.LFADS.modules.priors.MultivariateNormal
  mean: 0
  variance: 0.1
  shape: ${ic_dim}
ic_post_var_min: 0.0

dropout_rate: 0.02
cell_clip: 5.0
loss_scale: 1.0e+4
recon_reduce_mean: True

lr_init: 5.0e-3
lr_stop: 1.0e-5
lr_decay: 0.95
lr_patience: 6
lr_adam_beta1: 0.9
lr_adam_beta2: 0.999
lr_adam_epsilon: 1.0e-7
lr_scheduler: True

weight_decay: 0.0
l2_start_epoch: 0
l2_increase_epoch: 80
l2_ic_enc_scale: 0.0
l2_ci_enc_scale: 0.0
l2_gen_scale: 0.0
l2_con_scale: 0.0
l2_readout_scale: 0
kl_start_epoch: 0
kl_increase_epoch: 80
kl_ic_scale: 0.0
kl_co_scale: 0.0
